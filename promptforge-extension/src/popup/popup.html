<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PromptForge</title>

    <link rel="stylesheet" href="popup.css">
</head>

<body>

    <h1>PromptForge</h1>

    <p>Welcome to PromptForge Extension.</p>

    <button id="toggleSidebarBtn">
        Toggle Sidebar
    </button>

    <hr>

    <h3>Extension Authentication</h3>

    <input
        type="text"
        id="tokenInput"
        placeholder="Paste your JWT here"
    >

    <button id="saveTokenButton">
        Save JWT
    </button>

    <p id="status"></p>

    <script src="popup.js"></script>

</body>

</html>
